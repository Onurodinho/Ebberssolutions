name: Deploy naar Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy naar Cloudflare
    steps:
      - uses: actions/checkout@v4

      - name: Controleer Cloudflare credentials
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN en CLOUDFLARE_ACCOUNT_ID ontbreken in GitHub Secrets."
            echo "Zie scripts/setup-cloudflare-pages.sh voor instructies."
            exit 1
          fi

      - name: Publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
