[build]
  publish = "."

# Primair domein
[[redirects]]
  from = "https://ebbers-solutions.netlify.app/*"
  to = "https://ebberssolutions.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://ebberssolutions.com/*"
  to = "https://ebberssolutions.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.ebberssolutions.com/*"
  to = "https://ebberssolutions.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ebberssolutions.com/*"
  to = "https://ebberssolutions.com/:splat"
  status = 301
  force = true

# Admin-paneel (Decap CMS)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"